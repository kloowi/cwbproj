name: Deploy Backend to Azure Web App - jobmatch

on:
  push:
    branches: [main]
    paths:
      - "careerhive/backend/**"
      - ".github/workflows/main_jobmatch.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: careerhive/backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./careerhive/backend
        run: npm ci

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3F440219C702491EB28184F2A5C8083A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA9739A5A9A64D3E8824064236FFA335 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F39D6F1C8295482B8641C0C012158159 }}

      - name: Configure App Service runtime settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            RG=$(az webapp list --query "[?name=='jobmatch'].resourceGroup | [0]" -o tsv)
            if [ -z "$RG" ]; then
              echo "Unable to resolve resource group for app 'jobmatch'."
              exit 1
            fi

            az webapp config set \
              --name jobmatch \
              --resource-group "$RG" \
              --startup-file "node server.js"

            az webapp config appsettings set \
              --name jobmatch \
              --resource-group "$RG" \
              --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true WEBSITE_NODE_DEFAULT_VERSION=~20 RELEASE_COMMIT=${{ github.sha }}

      - name: Deploy backend folder to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: jobmatch
          slot-name: Production
          package: ./careerhive/backend