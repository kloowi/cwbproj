name: Deploy Agent Service to Azure Web App - careerhive-maf

on:
  push:
    branches: [main]
    paths:
      - "careerhive/agent-service/**"
      - ".github/workflows/main_careerhive-maf.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3F440219C702491EB28184F2A5C8083A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_EA9739A5A9A64D3E8824064236FFA335 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F39D6F1C8295482B8641C0C012158159 }}

      - name: Configure App Service runtime settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            RG=$(az webapp list --query "[?name=='careerhive-maf'].resourceGroup | [0]" -o tsv)
            if [ -z "$RG" ]; then
              echo "Unable to resolve resource group for app 'careerhive-maf'."
              exit 1
            fi

            az webapp config set \
              --name careerhive-maf \
              --resource-group "$RG" \
              --startup-command "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

            az webapp config appsettings set \
              --name careerhive-maf \
              --resource-group "$RG" \
              --settings \
                SCM_DO_BUILD_DURING_DEPLOYMENT=true \
                GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
                GROQ_MODEL=llama-3.3-70b-versatile \
                GROQ_BASE_URL=https://api.groq.com/openai/v1 \
                RELEASE_COMMIT=${{ github.sha }}

      - name: Deploy agent-service folder to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: careerhive-maf
          slot-name: Production
          package: ./careerhive/agent-service
