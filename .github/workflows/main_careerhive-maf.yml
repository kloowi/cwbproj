name: Build and deploy Python app to Azure Web App - careerhive-maf

on:
  push:
    branches:
      - main
    paths:
      - "careerhive/agent-service/**"
      - ".github/workflows/main_careerhive-maf.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_676441C8F139491980C79D877B310BEA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A8EA815DF7A748D6B696EC25B4EA2888 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_48793534C2DA4C49BC5CCDBC7CCAB8A0 }}

      - name: Configure startup command and app settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            RG=$(az webapp list --query "[?name=='careerhive-maf'].resourceGroup | [0]" -o tsv)

            az webapp config set \
              --name careerhive-maf \
              --resource-group "$RG" \
              --startup-file "python -m uvicorn app.main:app --host 0.0.0.0 --port \$PORT"

            az webapp config appsettings set \
              --name careerhive-maf \
              --resource-group "$RG" \
              --settings \
                SCM_DO_BUILD_DURING_DEPLOYMENT=true \
                GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
                GROQ_MODEL=llama-3.3-70b-versatile \
                GROQ_BASE_URL=https://api.groq.com/openai/v1 \
                RELEASE_COMMIT=${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'careerhive-maf'
          slot-name: 'Production'
          package: ./careerhive/agent-service
