name: Build and deploy Python app to Azure Web App - careerhive-maf

on:
  push:
    branches:
      - main
    paths:
      - "careerhive/agent-service/**"
      - ".github/workflows/main_careerhive-maf.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: ./careerhive/agent-service
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            careerhive/agent-service
            !careerhive/agent-service/antenv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_676441C8F139491980C79D877B310BEA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A8EA815DF7A748D6B696EC25B4EA2888 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_48793534C2DA4C49BC5CCDBC7CCAB8A0 }}

      - name: Configure startup command and app settings
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config set \
              --name careerhive-maf \
              --resource-group $(az webapp list --query "[?name=='careerhive-maf'].resourceGroup | [0]" -o tsv) \
              --startup-file "python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"

            az webapp config appsettings set \
              --name careerhive-maf \
              --resource-group $(az webapp list --query "[?name=='careerhive-maf'].resourceGroup | [0]" -o tsv) \
              --settings \
                SCM_DO_BUILD_DURING_DEPLOYMENT=true \
                GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
                GROQ_MODEL=llama-3.3-70b-versatile \
                GROQ_BASE_URL=https://api.groq.com/openai/v1 \
                RELEASE_COMMIT=${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'careerhive-maf'
          slot-name: 'Production'
